name: vpmobil_wrapper
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  http: ^1.5.0
  provider: ^6.1.5
  skeletonizer: ^2.1.0+1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: 2.3.7
  
  cupertino_icons: ^1.0.8
  timezone: ^0.10.1
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_app_name: ^0.1.0

dependency_overrides:
  xml: ^6.5.1

flutter_app_name:
  name: "Stundenplan"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist.ttf